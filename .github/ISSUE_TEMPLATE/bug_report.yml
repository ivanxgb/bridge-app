name: Bug report
description: Report something that is broken or confusing.
title: "bug: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Include commands, environment, browser, and tmux version when possible.
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: "OS, Go, Node, tmux, browser"
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste logs with secrets removed.
